
spring:
  application:
    name: zhiguang
  datasource:
    url: jdbc:mysql://localhost:3306/zhiguang?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1700000
      keepalive-time: 300000
      connection-timeout: 30000
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
  kafka:
    bootstrap-servers: localhost:9092
    template:
      default-topic: counter-events
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      linger: 10ms
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: counter-agg
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
    listener:
      type: single
      ack-mode: manual
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:your-api-key}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.8
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${DASHSCOPE_API_KEY:your-api-key}
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1536
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: zhiguang-ai-index
        dimensions: 1536
  elasticsearch:
    uris: http://localhost:9200

counter:
  rebuild:
    enabled: false
    lock:
      ttl-ms: 5000
      watchdog-ms: 30000
    rate:
      permits: 3
      window-seconds: 10
    backoff:
      base-ms: 500
      max-ms: 30000

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

auth:
  jwt:
    issuer: zhiguang
    key-id: zhiguang-key
    secret: ${JWT_SECRET:zhiguang-jwt-secret-key-must-be-at-least-256-bits-long!!}
    access-token-ttl: P7D
  password:
    bcrypt-strength: 12
    min-length: 8

logging:
  level:
    root: INFO
    '[com.ccnu]': DEBUG

oss:
  endpoint: oss-cn-beijing.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY_ID:your-access-key-id}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-access-key-secret}
  bucket: ${OSS_BUCKET:your-bucket}
  public-domain: ${OSS_PUBLIC_DOMAIN:}
  folder: zhiguang
